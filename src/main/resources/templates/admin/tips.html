<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Admin - Tips</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            color: #222;
        }

        .navbar {
            height: 65px;
            background: #263238;
            display: flex;
            align-items: center;
            padding: 0 30px;
            gap: 18px;
        }

        .logo {
            color: white;
            font-size: 20px;
            font-weight: bold;
            margin-right: 20px;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 15px;
        }

        .nav-link:hover,
        .nav-link.activo {
            background: #455a64;
        }

        .logout {
            margin-left: auto;
            color: white;
            text-decoration: none;
            background: #c62828;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 15px;
        }

        .logout:hover {
            background: #a81616;
        }

        .contenedor {
            max-width: 1000px;
            margin: 35px auto;
            padding: 0 25px;
        }

        .cabecera {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
        }

        .cabecera h1 {
            margin: 0;
            font-size: 30px;
            color: #263238;
        }

        .volver {
            color: white;
            background: #757575;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
        }

        .volver:hover {
            background: #555;
        }

        .panel {
            background: white;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
            margin-bottom: 24px;
        }

        .panel h2 {
            margin: 0 0 18px 0;
            color: #263238;
            font-size: 24px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 14px;
        }

        select,
        textarea {
            width: 100%;
            padding: 11px;
            border: 1px solid #bbb;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 15px;
            margin-bottom: 18px;
        }

        textarea {
            height: 120px;
            resize: vertical;
        }

        select:focus,
        textarea:focus {
            outline: none;
            border-color: #1976d2;
            box-shadow: 0 0 0 2px rgba(25, 118, 210, 0.15);
        }

        .btn {
            border: none;
            padding: 9px 13px;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            color: white;
            display: inline-block;
            font-weight: bold;
        }

        .btn-agregar {
            background: #2e7d32;
        }

        .btn-agregar:hover {
            background: #1b5e20;
        }

        .btn-editar {
            background: #1976d2;
        }

        .btn-editar:hover {
            background: #0d47a1;
        }

        .btn-eliminar {
            background: #c62828;
        }

        .btn-eliminar:hover {
            background: #8e0000;
        }

        .tabla-contenedor {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 750px;
        }

        th {
            background: #37474f;
            color: white;
            text-align: left;
            padding: 13px;
            font-size: 14px;
        }

        td {
            padding: 13px;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
            vertical-align: top;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .categoria {
            display: inline-block;
            padding: 5px 9px;
            border-radius: 5px;
            background: #00897b;
            color: white;
            font-size: 13px;
            font-weight: bold;
            text-transform: capitalize;
        }

        .contenido-tip {
            max-width: 520px;
            line-height: 1.4;
        }

        .acciones {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .acciones form {
            margin: 0;
        }

        .sin-tips {
            padding: 25px;
            background: #f5f5f5;
            border-radius: 6px;
            text-align: center;
            color: #666;
            font-size: 16px;
        }

        .info-destino {
            margin-bottom: 18px;
            background: #e3f2fd;
            color: #0d47a1;
            padding: 12px 16px;
            border-radius: 6px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <div class="logo">Desde Aquí | Admin</div>

        <a class="nav-link" href="/admin/destinos">Destinos</a>
        <a class="nav-link" href="/admin/usuarios">Usuarios</a>
        <a class="nav-link" href="/">Ver sitio</a>

        <a class="logout" href="/logout">Salir</a>
    </div>

    <div class="contenedor">

        <div class="cabecera">
            <h1>Gestión de tips</h1>

            <a class="volver" href="/admin/destinos">
                ← Volver a destinos
            </a>
        </div>

        <div class="info-destino">
            Destino: <span th:text="${destino.nombre}">Nombre del destino</span>
        </div>

        <div class="panel">
            <h2>Agregar tip</h2>

            <form method="post"
                  th:action="@{/admin/destinos/{id}/tips/guardar(id=${destino.id})}">

                <label for="categoria">Categoría</label>
                <select id="categoria" name="categoria" required>
                    <option value="">Seleccionar categoría</option>
                    <option value="transporte">Transporte</option>
                    <option value="comida">Comida</option>
                    <option value="hospedaje">Hospedaje</option>
                    <option value="lugares">Lugares</option>
                </select>

                <label for="contenido">Contenido del tip</label>
                <textarea id="contenido"
                          name="contenido"
                          placeholder="Escribí el consejo para este destino..."
                          required></textarea>

                <button class="btn btn-agregar" type="submit">
                    Agregar tip
                </button>
            </form>
        </div>

        <div class="panel">
            <h2>Tips actuales</h2>

            <div th:if="${tips == null or #lists.isEmpty(tips)}" class="sin-tips">
                Este destino no tiene tips todavía.
            </div>

            <div class="tabla-contenedor" th:if="${tips != null and !#lists.isEmpty(tips)}">

                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Categoría</th>
                            <th>Contenido</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="tip : ${tips}">
                            <td th:text="${tip.id}">1</td>

                            <td>
                                <span class="categoria" th:text="${tip.categoria}">
                                    transporte
                                </span>
                            </td>

                            <td class="contenido-tip" th:text="${tip.contenido}">
                                Contenido del tip
                            </td>

                            <td>
                                <div class="acciones">

                                    <form method="post"
                                          th:action="@{/admin/destinos/{did}/tips/eliminar/{tid}(did=${destino.id}, tid=${tip.id})}"
                                          onsubmit="return confirm('¿Eliminar este tip?')">

                                        <button class="btn btn-eliminar" type="submit">
                                            Eliminar
                                        </button>

                                    </form>

                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>

            </div>
        </div>

    </div>

</body>

</html>
