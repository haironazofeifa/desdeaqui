<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Admin - Usuarios</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            color: #222;
        }

        .navbar {
            height: 65px;
            background: #263238;
            display: flex;
            align-items: center;
            padding: 0 30px;
            gap: 18px;
        }

        .logo {
            color: white;
            font-size: 20px;
            font-weight: bold;
            margin-right: 20px;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 15px;
        }

        .nav-link:hover,
        .nav-link.activo {
            background: #455a64;
        }

        .logout {
            margin-left: auto;
            color: white;
            text-decoration: none;
            background: #c62828;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 15px;
        }

        .logout:hover {
            background: #a81616;
        }

        .contenedor {
            max-width: 1100px;
            margin: 35px auto;
            padding: 0 25px;
        }

        .cabecera {
            margin-bottom: 22px;
        }

        .cabecera h1 {
            margin: 0;
            font-size: 30px;
            color: #263238;
        }

        .mensaje {
            padding: 12px 16px;
            margin-bottom: 18px;
            border-radius: 6px;
            font-weight: bold;
        }

        .exito {
            background: #dff0d8;
            color: #2e7d32;
            border: 1px solid #b2d8b2;
        }

        .error {
            background: #ffe0e0;
            color: #c62828;
            border: 1px solid #e0a0a0;
        }

        .tabla-contenedor {
            background: white;
            border-radius: 8px;
            overflow-x: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        th {
            background: #37474f;
            color: white;
            text-align: left;
            padding: 14px;
            font-size: 14px;
        }

        td {
            padding: 13px 14px;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
            vertical-align: middle;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .foto {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #ccc;
            background: #eee;
        }

        .sin-foto {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .rol {
            display: inline-block;
            padding: 5px 9px;
            border-radius: 5px;
            background: #00897b;
            color: white;
            font-size: 13px;
            font-weight: bold;
        }

        .btn-eliminar {
            background: #c62828;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 13px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-eliminar:hover {
            background: #8e0000;
        }

        .vacio {
            background: white;
            padding: 30px;
            text-align: center;
            border-radius: 8px;
            color: #666;
            font-size: 17px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
        }
    </style>
</head>

<body>

    <div class="navbar">
        <div class="logo">Desde Aquí | Admin</div>

        <a class="nav-link" href="/admin/destinos">Destinos</a>
        <a class="nav-link activo" href="/admin/usuarios">Usuarios</a>
        <a class="nav-link" href="/">Ver sitio</a>

        <a class="logout" href="/logout">Salir</a>
    </div>

    <div class="contenedor">

        <div class="cabecera">
            <h1>Gestión de usuarios</h1>
        </div>

        <div class="mensaje exito" th:if="${param.exito}" th:text="${param.exito[0]}"></div>
        <div class="mensaje error" th:if="${param.error}" th:text="${param.error[0]}"></div>

        <div th:if="${usuarios == null or #lists.isEmpty(usuarios)}" class="vacio">
            No hay usuarios registrados.
        </div>

        <div class="tabla-contenedor" th:if="${usuarios != null and !#lists.isEmpty(usuarios)}">

            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Foto</th>
                        <th>Nombre</th>
                        <th>Correo</th>
                        <th>Rol</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody>
                    <tr th:each="u : ${usuarios}">

                        <td th:text="${u.id}">1</td>

                        <td>
                            <img class="foto"
                                 th:if="${u.fotoPerfil != null and !u.fotoPerfil.isEmpty()}"
                                 th:src="@{${u.fotoPerfil}}"
                                 alt="Foto de perfil">

                            <div class="sin-foto"
                                 th:unless="${u.fotoPerfil != null and !u.fotoPerfil.isEmpty()}">
                                👤
                            </div>
                        </td>

                        <td th:text="${u.nombre}">Nombre</td>

                        <td th:text="${u.correo}">correo@correo.com</td>

                        <td>
                            <span class="rol" th:text="${u.rol.nombre}">VIAJERO</span>
                        </td>

                        <td>
                            <form method="post"
                                  th:action="@{/admin/usuarios/eliminar/{id}(id=${u.id})}"
                                  onsubmit="return confirm('¿Eliminar este usuario?')">

                                <button class="btn-eliminar" type="submit">
                                    Eliminar
                                </button>

                            </form>
                        </td>

                    </tr>
                </tbody>
            </table>

        </div>

    </div>

</body>

</html>
