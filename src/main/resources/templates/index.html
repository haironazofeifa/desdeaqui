<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Desde Aquí</title>
  <link rel="stylesheet" th:href="@{/css/index.css}">
  <link rel="stylesheet" th:href="@{/css/estilos.css}">

</head>

<body>

  <div class="navbar">
    <div class="logo">Desde<br>Aquí</div>
    <button class="map-btn">Mapa</button>
    <button class="explo-btn" onclick="window.location.href='/explorar'">Explorar</button>
    <button class="guar-btn" onclick="window.location.href='/guardados'">Guardados</button>
    <button class="perfil-btn" onclick="window.location.href='/perfil'">Perfil</button>

    <div class="usuario-navbar">
      <span th:text="${usuario.nombre}"></span>
      <a class="btn-logout" href="/logout">Salir</a>
    </div>
  </div>

  <div class="contenedor">

    <div class="mapa">

      <div class="mapa-wrapper">
        <img src="/img/MapaCostaRica.png" class="imagen-mapa" alt="Mapa de Costa Rica">
        <button th:each="destino, i : ${destinos}" th:class="'pin p' + (${i.index} + 1)" th:data-id="${destino.id}"
          th:data-nombre="${destino.nombre}" th:data-imagen="${destino.imagen}"
          th:data-descripcion="${destino.descripcion}" onclick="seleccionarDestinoDesdeBoton(this)">
        </button>
      </div>

      <!-- Destinos guardados del usuario -->
      <div class="guardados">
        <h3>⭐ Mis destinos guardados</h3>
        <div class="cards">

          <div th:if="${#lists.isEmpty(guardados)}" style="font-size:13px; color:#f8e2b6; opacity:0.8;">
            Aún no guardaste destinos.
          </div>

          <div th:each="g : ${guardados}" class="card" th:data-id="${g.destino.id}" th:data-nombre="${g.destino.nombre}"
            th:data-imagen="${g.destino.imagen}" th:data-descripcion="${g.destino.descripcion}"
            onclick="seleccionarDestinoDesdeBoton(this)"> <img
              th:if="${g.destino.imagen != null and !g.destino.imagen.isEmpty()}"
              th:src="@{/img/{imagen}(imagen=${g.destino.imagen})}" th:alt="${g.destino.nombre}">
            <div th:unless="${g.destino.imagen != null and !g.destino.imagen.isEmpty()}" class="card-placeholder"> 🗺️
            </div>
            <div class="card-nombre" th:text="${g.destino.nombre}"></div>
          </div>

        </div>
      </div>

    </div>

    <!-- Panel lateral del destino seleccionado -->
    <div class="zona-panel">
      <div class="panel">

        <div class="titulo" id="tituloDestino">Seleccioná un destino</div>

        <div class="foto" id="fotoDestino">
          <img src="/img/fondo5.jpeg" alt="Imagen predeterminada">
        </div>

        <div class="descripcion" id="descripcionDestino">
          Hacé clic en un pin del mapa o en un destino guardado para ver sus detalles.
        </div>

        <button class="boton-libro transporte" type="button" onclick="verTips('transporte')"></button>
        <button class="boton-libro comida" type="button" onclick="verTips('comida')"></button>
        <button class="boton-libro hospedaje" type="button" onclick="verTips('hospedaje')"></button>
        <button class="boton-libro lugares" type="button" onclick="verTips('lugares')"></button>

        <form id="formGuardar" method="post" action="/guardados/agregar" onsubmit="return validarGuardarDestino()">
          <input type="hidden" id="inputDestinoId" name="destinoId" value="">
          <button class="guardar" type="submit"></button>
        </form>

      </div>
    </div>

  </div>

  <div id="modalTips" class="modal-tips">
    <button class="cerrar-modal" type="button" onclick="cerrarTips()">×</button>
    <div class="modal-header">
      <div class="modal-icono" id="iconoTips">🚌</div>
      <div>
        <h3 id="tituloTips">Tips locales</h3>
        <p id="subtituloTips">Consejos de viajeros locales</p>
      </div>
    </div>
    <div id="listaTips" class="lista-tips"></div>
  </div>

  <script>
    let destinoActivoId = null;
    let destinoActivoNombre = "";

    function validarGuardarDestino() {
      if (!destinoActivoId || document.getElementById('inputDestinoId').value === '') {
        alert('Primero seleccioná un destino del mapa.');
        return false;
      }
      return true;
    }

    function seleccionarDestinoDesdeBoton(elemento) {
      seleccionarDestino(
        elemento.dataset.id,
        elemento.dataset.nombre,
        elemento.dataset.imagen,
        elemento.dataset.descripcion
      );
    }

    function seleccionarDestino(id, nombre, imagen, descripcion) {
      destinoActivoId = id;
      destinoActivoNombre = nombre;

      document.getElementById('tituloDestino').innerText = nombre;
      document.getElementById('descripcionDestino').innerText = descripcion;
      document.getElementById('inputDestinoId').value = id;

      const foto = document.getElementById('fotoDestino');
      if (imagen && imagen.trim() !== '') {
        foto.innerHTML = '<img src="/img/' + imagen + '" alt="' + nombre + '">';
      } else {
        foto.innerHTML = '<img src="/img/fondo5.jpeg" alt="Imagen predeterminada">';
      }

      cerrarTips();
    }

    function cerrarTips() {
      document.getElementById('modalTips').classList.remove('visible');
    }

    function verTips(categoria) {
      if (!destinoActivoId) {
        alert("Primero seleccioná un destino.");
        return;
      }

      const iconos = {
        transporte: "🚌",
        comida: "🍽️",
        hospedaje: "🏠",
        lugares: "📍"
      };

      document.getElementById("iconoTips").innerText = iconos[categoria] || "💡";
      document.getElementById("tituloTips").innerText = "Tips de " + categoria + " — " + destinoActivoNombre;
      document.getElementById("subtituloTips").innerText = "Consejos locales para este destino";
      document.getElementById("listaTips").innerHTML = "Cargando...";
      document.getElementById("modalTips").classList.add("visible");

      // Guardamos la categoría activa para usarla al publicar
      document.getElementById("modalTips").dataset.categoria = categoria;
      document.getElementById("modalTips").dataset.destinoId = destinoActivoId;

      fetch("/api/tips?destinoId=" + destinoActivoId + "&categoria=" + encodeURIComponent(categoria))
        .then(r => r.json())
        .then(tips => {
          const lista = document.getElementById("listaTips");

          // Formulario para agregar tip — siempre visible arriba
          const formulario = `
        <div class="nuevo-tip-form" id="nuevoTipForm">
          <div class="nuevo-tip-titulo">✏️ Dejá tu propio tip</div>
          <textarea id="textoNuevoTip"
                    placeholder="Compartí un consejo útil para otros viajeros..."
                    maxlength="500"
                    rows="3"></textarea>
          <div class="nuevo-tip-acciones">
            <span class="contador-chars" id="contadorTip">0 / 500</span>
            <button class="btn-publicar-tip" onclick="publicarTip()">Publicar tip</button>
          </div>
        </div>
        <div class="separador-tips">
          ${tips.length > 0 ? tips.length + " tip" + (tips.length > 1 ? "s" : "") + " de la comunidad" : "Sé el primero en dejar un tip"}
        </div>
      `;

          if (tips.length === 0) {
            lista.innerHTML = formulario +
              '<div class="tip-vacio">Aún no hay tips en esta categoría.</div>';
          } else {
            lista.innerHTML = formulario + tips.map(t => `
  <div class="tip-card" id="tip-${t.id}">

    <div class="tip-meta">
      <span class="tip-autor">✍️ ${t.autor}</span>
      <span class="tip-hace">${t.hace}</span>
      ${t.esMio ? `
        <button class="btn-eliminar-tip"
                onclick="eliminarTip(${t.id})"
                title="Eliminar tip">🗑️</button>
      ` : ""}
    </div>

    <div class="tip-texto">${t.contenido}</div>

    <div class="tip-valoracion">
      <span class="estrellas-promedio" id="promedio-${t.id}">
        ${renderEstrellasFijas(t.promedio)}
        ${t.promedio > 0
                ? t.promedio.toFixed(1) + " (" + t.total + " valoraciones)"
                : "Sin valoraciones aún"}
      </span>
      <div class="estrellas-seleccion" id="seleccion-${t.id}">
        ${[1, 2, 3, 4, 5].map(n => `
          <button class="estrella ${n <= t.miPuntuacion ? "activa" : ""}"
                  onclick="puntuar(${t.id}, ${n})"
                  onmouseover="resaltarHasta(${t.id}, ${n})"
                  onmouseout="restaurar(${t.id})">★</button>
        `).join("")}
      </div>
    </div>

    <div class="comentarios-seccion" id="comentarios-${t.id}">
      <button class="btn-ver-comentarios"
              onclick="toggleComentarios(${t.id}, ${t.totalComentarios})">
        💬 ${t.totalComentarios > 0
                ? t.totalComentarios + " comentario" + (t.totalComentarios > 1 ? "s" : "")
                : "Comentar"}
      </button>
      <div class="comentarios-cuerpo" id="cuerpo-comentarios-${t.id}" style="display:none">
        <div class="lista-comentarios" id="lista-comentarios-${t.id}"></div>
        <div class="nuevo-comentario">
          <textarea id="texto-comentario-${t.id}"
                    placeholder="Escribí tu comentario..."
                    maxlength="500"
                    rows="2"></textarea>
          <button class="btn-publicar" onclick="publicarComentario(${t.id})">Publicar</button>
        </div>
      </div>
    </div>

  </div>
`).join("");
          }

          // Contador de caracteres del textarea de nuevo tip
          const textarea = document.getElementById("textoNuevoTip");
          if (textarea) {
            textarea.addEventListener("input", () => {
              document.getElementById("contadorTip").textContent =
                textarea.value.length + " / 500";
            });
          }
        })
        .catch(() => {
          document.getElementById("listaTips").innerHTML =
            '<div class="tip-vacio">No se pudieron cargar los tips.</div>';
        });
    }

    function publicarTip() {
      const modal = document.getElementById("modalTips");
      const categoria = modal.dataset.categoria;
      const destinoId = modal.dataset.destinoId;
      const textarea = document.getElementById("textoNuevoTip");
      const contenido = textarea.value.trim();

      if (!contenido) {
        textarea.focus();
        return;
      }

      const btn = document.querySelector(".btn-publicar-tip");
      btn.disabled = true;
      btn.textContent = "Publicando...";

      fetch("/api/tips", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: "destinoId=" + destinoId +
          "&categoria=" + encodeURIComponent(categoria) +
          "&contenido=" + encodeURIComponent(contenido)
      })
        .then(r => r.json())
        .then(data => {
          btn.disabled = false;
          btn.textContent = "Publicar tip";

          if (data.error) return;

          // Limpia el textarea y el contador
          textarea.value = "";
          document.getElementById("contadorTip").textContent = "0 / 500";

          // Inserta el nuevo tip al inicio de la lista, después del formulario
          const separador = document.querySelector(".separador-tips");
          const nuevoTip = document.createElement("div");
          nuevoTip.className = "tip-card tip-nuevo";
          nuevoTip.innerHTML = `
  <div class="tip-meta">
    <span class="tip-autor">✍️ ${data.autor}</span>
    <span class="tip-hace">${data.hace}</span>
    <button class="btn-eliminar-tip"
            onclick="eliminarTip(${data.id})"
            title="Eliminar tip">🗑️</button>
  </div>
  <div class="tip-texto">${data.contenido}</div>
  <div class="tip-valoracion">
    <span class="estrellas-promedio">Sin valoraciones aún</span>
    <div class="estrellas-seleccion"></div>
  </div>
  <div class="comentarios-seccion">
    <button class="btn-ver-comentarios">💬 Comentar</button>
  </div>
`;

          // Actualiza el texto del separador
          const totalActual = document.querySelectorAll(".tip-card").length;
          separador.textContent = totalActual + " tip" + (totalActual > 1 ? "s" : "") + " de la comunidad";

          separador.insertAdjacentElement("afterend", nuevoTip);
        });
    }

    function renderEstrellasFijas(promedio) {
      return [1, 2, 3, 4, 5].map(n => {
        const llena = n <= Math.floor(promedio) ||
          (n === Math.ceil(promedio) && promedio % 1 >= 0.5);
        return `<span style="color:${llena ? '#e6a817' : '#ccc'}">★</span>`;
      }).join('');
    }

    function resaltarHasta(tipId, n) {
      document.querySelectorAll('#seleccion-' + tipId + ' .estrella')
        .forEach((b, i) => b.style.color = i < n ? '#e6a817' : '#ccc');
    }

    function restaurar(tipId) {
      document.querySelectorAll('#seleccion-' + tipId + ' .estrella')
        .forEach(b => {
          b.style.color = b.classList.contains('activa') ? '#e6a817' : '#ccc';
        });
    }

    function toggleComentarios(tipId, total) {
      const cuerpo = document.getElementById('cuerpo-comentarios-' + tipId);
      const abierto = cuerpo.style.display !== 'none';

      if (abierto) {
        cuerpo.style.display = 'none';
        return;
      }

      cuerpo.style.display = 'block';

      const lista = document.getElementById('lista-comentarios-' + tipId);
      if (lista.dataset.cargado) return;

      if (total === 0) {
        lista.innerHTML = '<p class="sin-comentarios">Sé el primero en comentar.</p>';
        lista.dataset.cargado = 'true';
        return;
      }

      lista.innerHTML = '<p class="cargando-comentarios">Cargando...</p>';

      fetch('/api/tips/' + tipId + '/comentarios')
        .then(r => r.json())
        .then(comentarios => {
          lista.innerHTML = comentarios.map(c => `
  <div class="comentario-item" id="comentario-${c.id}">
    <div class="comentario-meta">
      <span class="comentario-usuario">👤 ${c.usuario}</span>
      <span class="comentario-hace">${c.hace}</span>
      ${c.esMio ? `
        <button class="btn-eliminar-comentario"
                onclick="eliminarComentario(${c.id}, ${tipId})"
                title="Eliminar comentario">🗑️</button>
      ` : ""}
    </div>
    <div class="comentario-texto">${c.contenido}</div>
  </div>
`).join("");
          lista.dataset.cargado = 'true';
        });
    }

    function publicarComentario(tipId) {
      const textarea = document.getElementById('texto-comentario-' + tipId);
      const contenido = textarea.value.trim();

      if (!contenido) {
        textarea.focus();
        return;
      }

      fetch('/api/tips/' + tipId + '/comentarios', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'contenido=' + encodeURIComponent(contenido)
      })
        .then(r => r.json())
        .then(data => {
          if (data.error) return;

          const lista = document.getElementById('lista-comentarios-' + tipId);
          if (lista.querySelector('.sin-comentarios')) {
            lista.innerHTML = '';
          }

          const nuevoComentario = document.createElement('div');
          nuevoComentario.className = 'comentario-item nuevo';
          nuevoComentario.innerHTML = `
  <div class="comentario-meta">
    <span class="comentario-usuario">👤 ${data.usuario}</span>
    <span class="comentario-hace">${data.hace}</span>
    <button class="btn-eliminar-comentario"
            onclick="eliminarComentario(${data.id}, ${tipId})"
            title="Eliminar comentario">🗑️</button>
  </div>
  <div class="comentario-texto">${data.contenido}</div>
`;

          lista.insertBefore(nuevoComentario, lista.firstChild);

          const btn = document.querySelector('#comentarios-' + tipId + ' .btn-ver-comentarios');
          const totalActual = lista.querySelectorAll('.comentario-item').length;
          btn.textContent = '💬 ' + totalActual + (totalActual > 1 ? ' comentarios' : ' comentario');

          textarea.value = '';
        });
    }

    function puntuar(tipId, estrellas) {
      fetch('/api/tips/' + tipId + '/puntuar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'estrellas=' + estrellas
      })
        .then(r => r.json())
        .then(data => {
          // Actualiza estrellas seleccionadas
          document.querySelectorAll('#seleccion-' + tipId + ' .estrella')
            .forEach((b, i) => {
              b.classList.toggle('activa', i < estrellas);
              b.style.color = i < estrellas ? '#e6a817' : '#ccc';
            });

          // Actualiza el promedio mostrado
          document.getElementById('promedio-' + tipId).innerHTML =
            renderEstrellasFijas(data.promedio) + ' ' +
            (data.promedio > 0
              ? data.promedio.toFixed(1) + ' (' + data.total + ' valoraciones)'
              : 'Sin valoraciones aún');
        });
    }
    function eliminarTip(tipId) {
      if (!confirm("¿Eliminar este tip?")) return;

      fetch("/api/tips/" + tipId + "/eliminar", { method: "POST" })
        .then(r => r.json())
        .then(data => {
          if (data.error) return;

          // Remueve la tarjeta del DOM
          const card = document.getElementById("tip-" + tipId);
          if (card) card.remove();

          // Actualiza el contador del separador
          const total = document.querySelectorAll(".tip-card").length;
          const separador = document.querySelector(".separador-tips");
          if (separador) {
            separador.textContent = total > 0
              ? total + " tip" + (total > 1 ? "s" : "") + " de la comunidad"
              : "Sé el primero en dejar un tip";
          }
        });
    }

    function eliminarComentario(comentarioId, tipId) {
      if (!confirm("¿Eliminar este comentario?")) return;

      fetch("/api/comentarios/" + comentarioId + "/eliminar", { method: "POST" })
        .then(r => r.json())
        .then(data => {
          if (data.error) return;

          // Remueve el comentario del DOM
          const item = document.getElementById("comentario-" + comentarioId);
          if (item) item.remove();

          // Actualiza el contador del botón
          const lista = document.getElementById("lista-comentarios-" + tipId);
          const total = lista.querySelectorAll(".comentario-item").length;
          const btn = document.querySelector("#comentarios-" + tipId + " .btn-ver-comentarios");
          if (btn) {
            btn.textContent = total > 0
              ? "💬 " + total + " comentario" + (total > 1 ? "s" : "")
              : "💬 Comentar";
          }

          if (total === 0) {
            lista.innerHTML = '<p class="sin-comentarios">Sé el primero en comentar.</p>';
          }
        });
    }
  </script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const rutaActual = window.location.pathname;

      if (rutaActual === "/") {
        document.querySelector(".map-btn")?.classList.add("activo");
      }
      if (rutaActual.startsWith("/explorar")) {
        document.querySelector(".explo-btn")?.classList.add("activo");
      }
      if (rutaActual.startsWith("/guardados")) {
        document.querySelector(".guar-btn")?.classList.add("activo");
      }
      if (rutaActual.startsWith("/perfil")) {
        document.querySelector(".perfil-btn")?.classList.add("activo");
      }
    });
  </script>
</body>

</html>
