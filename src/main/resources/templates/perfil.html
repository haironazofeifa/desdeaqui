<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Perfil - Desde Aquí</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <link rel="stylesheet" th:href="@{/css/perfil.css}">
</head>

<body>

    <div class="navbar">
        <div class="logo">Desde<br>Aquí</div>

        <button class="map-btn" onclick="window.location.href='/'"></button>
        <button class="explo-btn" onclick="window.location.href='/explorar'"></button>
        <button class="guar-btn" onclick="window.location.href='/guardados'"></button>
        <button class="perfil-btn" onclick="window.location.href='/perfil'"></button>

        <div class="usuario-navbar" th:if="${usuario != null}">

            <div class="usuario-info">

                <div class="foto-navbar">
                    <img th:if="${usuario.fotoPerfil != null and !usuario.fotoPerfil.isEmpty()}"
                        th:src="@{${usuario.fotoPerfil}}" alt="Foto de perfil">

                    <span th:unless="${usuario.fotoPerfil != null and !usuario.fotoPerfil.isEmpty()}">👤</span>
                </div>

                <span class="usuario-nombre" th:text="${usuario.nombre}">Usuario</span>

            </div>

            <a class="btn-salir" href="/logout">
                Salir
            </a>

        </div>

    </div>

    <div class="contenedor">

        <div class="perfil">

            <div class="titulo-perfil">
            </div>

            <div class="contenido">

                <div class="tarjeta-usuario">

                    <div class="avatar">

                        <img th:if="${usuario.fotoPerfil != null}" th:src="@{${usuario.fotoPerfil}}"
                            alt="Foto de perfil">

                        <span th:unless="${usuario.fotoPerfil != null}">
                            👤
                        </span>

                    </div>

                    <div class="nombre" th:text="${usuario.nombre}">
                        Nombre
                    </div>

                    <div class="correo" th:text="${usuario.correo}">
                        correo@correo.com
                    </div>

                    <div class="rol" th:text="${usuario.rol.nombre}">
                        VIAJERO
                    </div>
                    <div class="botones-perfil">

                        <form method="post" action="/perfil/foto" enctype="multipart/form-data">
                            <label class="btn-perfil-img btn-editar-foto" for="fotoUsuario">
                                Editar foto
                            </label>

                            <input type="file" id="fotoUsuario" name="foto" accept="image/*"
                                onchange="this.form.submit()" style="display: none;">
                        </form>

                        <button class="btn-perfil-img btn-cerrar-sesion" type="button"
                            onclick="window.location.href='/logout'">
                            Cerrar sesión
                        </button>

                    </div>

                </div>

                <div class="derecha">

                    <div class="seccion">

                        <h2>Actividad real</h2>

                        <div class="estadisticas">

                            <div class="stat">
                                <img src="/img/destinos.png" alt="Destinos" class="icono-stat">
                                <div class="numero" th:text="${totalGuardados}">0</div>
                                <div class="texto-stat">Destinos guardados</div>
                            </div>

                            <div class="stat">
                                <img src="/img/tips.png" alt="Tips" class="icono-stat">
                                <div class="numero" th:text="${totalTips}">0</div>
                                <div class="texto-stat">Tips publicados</div>
                            </div>

                            <div class="stat">
                                <img src="/img/comentarios.png" alt="Comentarios" class="icono-stat">
                                <div class="numero" th:text="${totalComentarios}">0</div>
                                <div class="texto-stat">Comentarios</div>
                            </div>

                            <div class="stat">
                                <img src="/img/puntuaciones.png" alt="Puntuaciones" class="icono-stat">
                                <div class="numero" th:text="${totalPuntuaciones}">0</div>
                                <div class="texto-stat">Puntuaciones</div>
                            </div>

                        </div>

                    </div>

                    <div class="seccion">

                        <h2>Destinos guardados</h2>

                        <div th:if="${#lists.isEmpty(guardados)}" class="vacio">
                            Todavía no tienes destinos guardados.
                        </div>

                        <div class="lista-destinos" th:if="${!#lists.isEmpty(guardados)}">

                            <div class="destino-card" th:each="g : ${guardados}">

                                <img th:if="${g.destino.imagen != null and !g.destino.imagen.isEmpty()}"
                                    th:src="@{/img/{imagen}(imagen=${g.destino.imagen})}" th:alt="${g.destino.nombre}">

                                <img th:unless="${g.destino.imagen != null and !g.destino.imagen.isEmpty()}"
                                    src="/img/fondo5.jpeg" alt="Imagen predeterminada">

                                <div class="destino-nombre" th:text="${g.destino.nombre}">
                                    Destino
                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script>
        const rutaActual = window.location.pathname;

        if (rutaActual === "/") {
            document.querySelector(".map-btn")?.classList.add("activo");
        }

        if (rutaActual.startsWith("/explorar")) {
            document.querySelector(".explo-btn")?.classList.add("activo");
        }

        if (rutaActual.startsWith("/guardados")) {
            document.querySelector(".guar-btn")?.classList.add("activo");
        }

        if (rutaActual.startsWith("/perfil")) {
            document.querySelector(".perfil-btn")?.classList.add("activo");
        }
    </script>
    <script>
        const inputFoto = document.getElementById("fotoUsuario");
        const previewFoto = document.getElementById("previewFoto");
        const avatarIcono = document.getElementById("avatarIcono");

        inputFoto.addEventListener("change", function () {
            const archivo = this.files[0];

            if (archivo) {
                const lector = new FileReader();

                lector.onload = function (e) {
                    previewFoto.src = e.target.result;
                    previewFoto.style.display = "block";
                    avatarIcono.style.display = "none";
                };

                lector.readAsDataURL(archivo);
            }
        });
    </script>

</body>

</html>
