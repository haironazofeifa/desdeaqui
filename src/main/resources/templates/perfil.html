<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Perfil - Desde Aquí</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">

    <style>
        .contenedor {
            height: calc(100vh - 80px);
            background-image: url("/img/fondoMar.png");
            background-size: cover;
            background-position: center;

            display: flex;
            justify-content: center;
            align-items: center;

            padding: 20px;
            overflow: hidden;
        }

        .perfil {
            width: 1100px;
            height: 690px;

            background-image: url("/img/perfilfondo.png");
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;

            padding: 0px 90px 60px 90px;
            overflow: hidden;
        }

        .titulo-perfil {
            width: 480px;
            height: 75px;

            margin: 5px auto 20px auto;

            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;

            display: flex;
            justify-content: center;
            align-items: center;

            color: #f7f0d8;
            font-size: 30px;
            font-weight: bold;

            text-shadow:
                2px 2px 0 #1c3d12,
                3px 3px 0 rgba(0, 0, 0, 0.45);
        }

        .contenido {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 26px;
            height: 500px;

            position: relative;
            left: 65px;
        }

        .tarjeta-usuario {
            background: rgba(248, 227, 179, 0.88);
            border: 4px solid #5a2d12;
            box-shadow: 4px 4px 0 rgba(43, 18, 6, 0.35);

            padding: 20px;
            text-align: center;
        }

        .avatar {
            width: 160px;
            height: 160px;

            margin: 0 auto 16px auto;

            background: #fff3d5;
            border: 5px solid #8b5a2b;

            display: flex;
            justify-content: center;
            align-items: center;

            font-size: 80px;
        }

        .nombre {
            font-size: 28px;
            font-weight: bold;
            color: #3b210f;
            margin-bottom: 8px;
        }

        .correo {
            font-size: 14px;
            color: #5a2d12;
            margin-bottom: 12px;
            word-break: break-word;
        }

        .rol {
            width: 230px;
            height: 80px;

            margin: 10px auto 0 auto;

            background-image: url("/img/tipoViajero.png");
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;

            border: none;
            background-color: transparent;

            display: flex;
            align-items: center;
            justify-content: center;

            padding-left: 55px;

            color: #f7f0d8;
            font-size: 18px;
            font-weight: bold;
            text-transform: capitalize;

            text-shadow:
                2px 2px 0 #1c3d12,
                3px 3px 0 rgba(0, 0, 0, 0.45);

            position: relative;
            left: -15px;
        }

        .derecha {
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow: hidden;
        }

        .seccion {
            background: rgba(248, 227, 179, 0.88);
            border: 4px solid #5a2d12;
            box-shadow: 4px 4px 0 rgba(43, 18, 6, 0.35);
            width: 525px;

            padding: 16px;
        }

        .seccion h2 {
            margin: 0 0 14px 0;
            color: #3b210f;
            font-size: 24px;
        }

        .estadisticas {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .stat {
            background: #fff3d5;
            border: 3px solid #8b5a2b;
            text-align: center;
            padding: 12px 8px;
        }

        .numero {
            font-size: 32px;
            font-weight: bold;
            color: #3e7f20;
        }

        .texto-stat {
            font-size: 13px;
            color: #4b250f;
            font-weight: bold;
        }

        .lista-destinos {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;

            max-height: 260px;
            overflow-y: auto;
            padding-right: 6px;
        }

        .destino-card {
            background: #fff3d5;
            border: 3px solid #8b5a2b;
            overflow: hidden;
        }

        .destino-card img {
            width: 100%;
            height: 95px;
            object-fit: cover;
            display: block;
        }

        .destino-nombre {
            padding: 8px;
            text-align: center;
            font-weight: bold;
            color: #3b210f;
            font-size: 15px;
        }

        .vacio {
            background: #fff3d5;
            border: 3px dashed #8b5a2b;
            padding: 20px;
            text-align: center;
            color: #5a2d12;
            font-weight: bold;
        }

        .botones-perfil {
            margin-top: 18px;

            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .btn-perfil-img {
            width: 220px;
            height: 45px;

            border: none;
            background-color: transparent;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;

            color: transparent;
            font-size: 0;

            cursor: pointer;
            display: block;
        }

        .btn-editar-foto {
            background-image: url("/img/editarfoto.png");
        }

        .btn-cerrar-sesion {
            background-image: url("/img/cerrarsesion.png");
        }

        .btn-perfil-img:hover {
            transform: scale(1.03);
        }

        .avatar {
            width: 160px;
            height: 160px;

            margin: 0 auto 16px auto;

            background: #fff3d5;
            border: 5px solid #8b5a2b;

            display: flex;
            justify-content: center;
            align-items: center;

            font-size: 80px;
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .estadisticas {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .stat {
            background: #fff3d5;
            border: 3px solid #8b5a2b;
            text-align: center;
            padding: 12px 8px;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .icono-stat {
            width: 34px;
            height: 34px;
            object-fit: contain;
            display: block;
        }

        .numero {
            font-size: 32px;
            font-weight: bold;
            color: #3e7f20;
            line-height: 1;
        }

        .texto-stat {
            font-size: 13px;
            color: #4b250f;
            font-weight: bold;
            line-height: 1.1;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <div class="logo">Desde<br>Aquí</div>

        <button class="map-btn" onclick="window.location.href='/'"></button>
        <button class="explo-btn" onclick="window.location.href='/explorar'"></button>
        <button class="guar-btn" onclick="window.location.href='/guardados'"></button>
        <button class="perfil-btn" onclick="window.location.href='/perfil'"></button>

        <div class="usuario-navbar" th:if="${usuario != null}">

            <div class="usuario-info">

                <div class="foto-navbar">
                    <img th:if="${usuario.fotoPerfil != null and !usuario.fotoPerfil.isEmpty()}"
                        th:src="@{${usuario.fotoPerfil}}" alt="Foto de perfil">

                    <span th:unless="${usuario.fotoPerfil != null and !usuario.fotoPerfil.isEmpty()}">👤</span>
                </div>

                <span class="usuario-nombre" th:text="${usuario.nombre}">Usuario</span>

            </div>

            <a class="btn-salir" href="/logout">
                Salir
            </a>

        </div>

    </div>

    <div class="contenedor">

        <div class="perfil">

            <div class="titulo-perfil">
            </div>

            <div class="contenido">

                <div class="tarjeta-usuario">

                    <div class="avatar">

                        <img th:if="${usuario.fotoPerfil != null}" th:src="@{${usuario.fotoPerfil}}"
                            alt="Foto de perfil">

                        <span th:unless="${usuario.fotoPerfil != null}">
                            👤
                        </span>

                    </div>

                    <div class="nombre" th:text="${usuario.nombre}">
                        Nombre
                    </div>

                    <div class="correo" th:text="${usuario.correo}">
                        correo@correo.com
                    </div>

                    <div class="rol" th:text="${usuario.rol.nombre}">
                        VIAJERO
                    </div>
                    <div class="botones-perfil">

                        <form method="post" action="/perfil/foto" enctype="multipart/form-data">
                            <label class="btn-perfil-img btn-editar-foto" for="fotoUsuario">
                                Editar foto
                            </label>

                            <input type="file" id="fotoUsuario" name="foto" accept="image/*"
                                onchange="this.form.submit()" style="display: none;">
                        </form>

                        <button class="btn-perfil-img btn-cerrar-sesion" type="button"
                            onclick="window.location.href='/logout'">
                            Cerrar sesión
                        </button>

                    </div>

                </div>

                <div class="derecha">

                    <div class="seccion">

                        <h2>Actividad real</h2>

                        <div class="estadisticas">

                            <div class="stat">
                                <img src="/img/destinos.png" alt="Destinos" class="icono-stat">
                                <div class="numero" th:text="${totalGuardados}">0</div>
                                <div class="texto-stat">Destinos guardados</div>
                            </div>

                            <div class="stat">
                                <img src="/img/tips.png" alt="Tips" class="icono-stat">
                                <div class="numero" th:text="${totalTips}">0</div>
                                <div class="texto-stat">Tips publicados</div>
                            </div>

                            <div class="stat">
                                <img src="/img/comentarios.png" alt="Comentarios" class="icono-stat">
                                <div class="numero" th:text="${totalComentarios}">0</div>
                                <div class="texto-stat">Comentarios</div>
                            </div>

                            <div class="stat">
                                <img src="/img/puntuaciones.png" alt="Puntuaciones" class="icono-stat">
                                <div class="numero" th:text="${totalPuntuaciones}">0</div>
                                <div class="texto-stat">Puntuaciones</div>
                            </div>

                        </div>

                    </div>

                    <div class="seccion">

                        <h2>Destinos guardados</h2>

                        <div th:if="${#lists.isEmpty(guardados)}" class="vacio">
                            Todavía no tienes destinos guardados.
                        </div>

                        <div class="lista-destinos" th:if="${!#lists.isEmpty(guardados)}">

                            <div class="destino-card" th:each="g : ${guardados}">

                                <img th:if="${g.destino.imagen != null and !g.destino.imagen.isEmpty()}"
                                    th:src="@{/img/{imagen}(imagen=${g.destino.imagen})}" th:alt="${g.destino.nombre}">

                                <img th:unless="${g.destino.imagen != null and !g.destino.imagen.isEmpty()}"
                                    src="/img/fondo5.jpeg" alt="Imagen predeterminada">

                                <div class="destino-nombre" th:text="${g.destino.nombre}">
                                    Destino
                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script>
        const rutaActual = window.location.pathname;

        if (rutaActual === "/") {
            document.querySelector(".map-btn")?.classList.add("activo");
        }

        if (rutaActual.startsWith("/explorar")) {
            document.querySelector(".explo-btn")?.classList.add("activo");
        }

        if (rutaActual.startsWith("/guardados")) {
            document.querySelector(".guar-btn")?.classList.add("activo");
        }

        if (rutaActual.startsWith("/perfil")) {
            document.querySelector(".perfil-btn")?.classList.add("activo");
        }
    </script>
    <script>
        const inputFoto = document.getElementById("fotoUsuario");
        const previewFoto = document.getElementById("previewFoto");
        const avatarIcono = document.getElementById("avatarIcono");

        inputFoto.addEventListener("change", function () {
            const archivo = this.files[0];

            if (archivo) {
                const lector = new FileReader();

                lector.onload = function (e) {
                    previewFoto.src = e.target.result;
                    previewFoto.style.display = "block";
                    avatarIcono.style.display = "none";
                };

                lector.readAsDataURL(archivo);
            }
        });
    </script>

</body>

</html>
