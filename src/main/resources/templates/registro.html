<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro - Desde Aquí</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Georgia, serif;
            background: #0b6f9c;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .panel {
            background: #f4dfb4;
            border: 6px solid #5a2d12;
            padding: 40px;
            width: 420px;
            box-shadow: 0 0 0 4px #2b1206;
        }

        .titulo {
            background: #3e7f20;
            color: white;
            text-align: center;
            font-size: 26px;
            padding: 10px;
            border: 4px solid #244b14;
            margin-bottom: 28px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 15px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 3px solid #8b5a2b;
            background: #fff9ee;
            font-family: Georgia, serif;
            font-size: 15px;
            margin-bottom: 20px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: #3e7f20;
            color: white;
            border: 3px solid #244b14;
            font-family: Georgia, serif;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 14px;
        }

        .btn:hover { background: #2f6418; }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: transparent;
            color: #5a2d12;
            border: 3px solid #5a2d12;
            font-family: Georgia, serif;
            font-size: 15px;
            cursor: pointer;
            text-align: center;
        }

        .btn-login:hover { background: #e8cfa0; }

        .error {
            background: #a32d2d;
            color: white;
            padding: 10px;
            text-align: center;
            margin-bottom: 18px;
            border: 2px solid #7e1d1d;
            font-size: 14px;
        }

        .exito {
            background: #3e7f20;
            color: white;
            padding: 10px;
            text-align: center;
            margin-bottom: 18px;
            border: 2px solid #244b14;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="panel">

        <div class="titulo">🗺️ Crear cuenta</div>

        <!-- Mensajes de error o éxito -->
        <div class="error"  th:if="${error}"  th:text="${error}"></div>
        <div class="exito"  th:if="${exito}"  th:text="${exito}"></div>

        <form method="post" action="/registro">

            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre"
                   placeholder="Tu nombre completo" required>

            <label for="correo">Correo</label>
            <input type="email" id="correo" name="correo"
                   placeholder="tu@correo.com" required>

            <label for="contrasena">Contraseña</label>
            <input type="password" id="contrasena" name="contrasena"
                   placeholder="Mínimo 6 caracteres" required>

            <label for="confirmar">Confirmar contraseña</label>
            <input type="password" id="confirmar" name="confirmar"
                   placeholder="Repetí la contraseña" required>

            <button class="btn" type="submit">Crear cuenta</button>

        </form>

        <button class="btn-login" onclick="window.location.href='/login'">
            ¿Ya tenés cuenta? Iniciá sesión
        </button>

    </div>

</body>
</html>
