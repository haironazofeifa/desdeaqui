<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Registro - Desde Aquí</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, serif;
            color: #2b1a0c;

            background-image: url("/img/fondologin.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .registro-panel {
            width: 450px;
            height: 690px;

            background-image: url("/img/login.png");
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;

            padding: 52px 58px 55px 58px;

            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .registro-logo {
            width: 100%;
            height: 85px;

            background-image: url("/img/DesdeAqui.png");
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;

            margin-bottom: 8px;

            color: transparent;
            font-size: 0;
        }

        .registro-titulo {
            width: 100%;
            height: 58px;

            background-image: url("/img/titulo.png");
            background-size: 100% 100%;
            background-repeat: no-repeat;
            background-position: center;

            display: flex;
            justify-content: center;
            align-items: center;

            color: #f7f0d8;
            font-size: 23px;
            font-weight: bold;
            text-align: center;

            text-shadow:
                2px 2px 0 #1c3d12,
                3px 3px 0 rgba(0, 0, 0, 0.45);

            margin-bottom: 18px;
        }

        .error {
            background: #a32d2d;
            color: white;
            padding: 9px;
            text-align: center;
            margin-bottom: 14px;
            border: 2px solid #7e1d1d;
            font-size: 14px;
            font-weight: bold;
        }

        .exito {
            background: #3e7f20;
            color: white;
            padding: 9px;
            text-align: center;
            margin-bottom: 14px;
            border: 2px solid #244b14;
            font-size: 14px;
            font-weight: bold;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 15px;
        }

        input {
            width: 100%;
            height: 45px;
            padding: 10px 12px;

            border: 3px solid #8b5a2b;
            background: #fff9ee;

            font-family: Georgia, serif;
            font-size: 15px;

            margin-bottom: 14px;
            outline: none;
        }

        input:focus {
            border-color: #3e7f20;
            box-shadow: 0 0 0 2px rgba(62, 127, 32, 0.25);
        }

        .btn-crear {
            width: 100%;
            height: 52px;

            background: #3e7f20;
            color: #fff7d7;

            border: 4px solid #244b14;

            font-family: Georgia, serif;
            font-size: 19px;
            font-weight: bold;

            cursor: pointer;
            margin-top: 5px;

            text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.35);
            box-shadow: 3px 3px 0 #2b1206;
        }

        .btn-crear:hover {
            background: #2f6418;
            transform: scale(1.01);
        }

        .btn-login {
            width: 100%;
            height: 48px;

            background: #f8e3b3;
            color: #5a2d12;

            border: 3px solid #8b5a2b;

            font-family: Georgia, serif;
            font-size: 15px;
            font-weight: bold;

            cursor: pointer;
            text-align: center;

            margin-top: 14px;
            box-shadow: 3px 3px 0 rgba(43, 18, 6, 0.35);
        }

        .btn-login:hover {
            background: #e8cfa0;
            transform: scale(1.01);
        }
    </style>
</head>

<body>

    <div class="registro-panel">

        <div class="registro-logo"></div>

        <div class="registro-titulo">Crear cuenta</div>

        <div class="error" th:if="${error}" th:text="${error}"></div>
        <div class="exito" th:if="${exito}" th:text="${exito}"></div>

        <form method="post" action="/registro">

            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre"
                   placeholder="Tu nombre completo" required>

            <label for="correo">Correo:</label>
            <input type="email" id="correo" name="correo"
                   placeholder="tu@correo.com" required>

            <label for="contrasena">Contraseña:</label>
            <input type="password" id="contrasena" name="contrasena"
                   placeholder="Mínimo 6 caracteres" required>

            <label for="confirmar">Confirmar contraseña:</label>
            <input type="password" id="confirmar" name="confirmar"
                   placeholder="Repetí la contraseña" required>

            <button class="btn-crear" type="submit">
                Crear cuenta
            </button>

        </form>

        <button class="btn-login" type="button" onclick="window.location.href='/login'">
            ¿Ya tenés cuenta? Iniciá sesión
        </button>

    </div>

</body>

</html>
