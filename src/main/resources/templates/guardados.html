<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Guardados - Desde Aquí</title>
  <link rel="stylesheet" th:href="@{/css/estilos.css}">

  <style>
    .contenedor {
      height: calc(100vh - 80px);
      background-image: url("/img/fondoMar.png");
      background-size: cover;
      background-position: center;

      display: flex;
      justify-content: center;
      align-items: center;

      padding: 25px;
      overflow: hidden;
    }

    .panel-guardados {
      width: 1150px;
      height: 700px;

      background-image: url("/img/guardadoslista.png");
      background-size: 100% 100%;
      background-repeat: no-repeat;
      background-position: center;

      padding: 55px 90px 55px 90px;

      overflow: hidden;
    }

    .titulo-guardados {
      width: 520px;
      height: 80px;

      margin: 20px auto 12px auto;

      background-image: url("/img/titulo.png");
      background-size: 100% 100%;
      background-repeat: no-repeat;
      background-position: center;

      display: flex;
      align-items: center;
      justify-content: center;

      color: #f7f0d8;
      font-size: 27px;
      font-weight: bold;
      text-align: center;

      text-shadow:
        2px 2px 0 #1c3d12,
        3px 3px 0 rgba(0, 0, 0, 0.45);
    }

    .subtitulo {
      text-align: center;
      font-size: 17px;
      color: #4b250f;
      margin-bottom: 22px;
      font-weight: bold;
    }

    .lista-guardados {
      height: 415px;
      overflow-y: auto;

      display: flex;
      flex-direction: column;
      gap: 5px;

      padding-right: 10px;
    }

    .destino {
      background: rgba(248, 227, 179, 0.88);
      border: 4px solid #5a2d12;
      box-shadow: 4px 4px 0 rgba(43, 18, 6, 0.35);

      padding: 12px 16px;

      display: grid;
      grid-template-columns: 130px 1fr 230px;
      gap: 18px;
      align-items: center;
    }

    .destino-img {
      width: 130px;
      height: 95px;

      border: 4px solid #8b5a2b;
      background: #d8b77b;

      overflow: hidden;
    }

    .destino-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .info h2 {
      margin: 0 0 8px 0;
      font-size: 25px;
      color: #3b210f;
    }

    .info p {
      margin: 0;
      font-size: 15px;
      line-height: 1.35;
      color: #4b250f;
    }

    .acciones {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }

    .acciones form {
      margin: 0;
      width: 100%;
    }

    .btn-img-guardado {
      width: 210px;
      height: 58px;

      border: none;
      background-color: transparent;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;

      color: transparent;
      font-size: 0;

      cursor: pointer;
      display: block;
    }

    .ver {
      background-image: url("/img/verenelmapa.png");
    }

    .eliminar {
      background-image: url("/img/eliminar.png");
    }

    .btn-img-guardado:hover {
      transform: scale(1.03);
    }

    .vacio {
      text-align: center;
      font-size: 18px;
      color: #5a2d12;
      background: rgba(248, 227, 179, 0.88);
      border: 4px solid #5a2d12;
      padding: 30px;
      margin-top: 25px;
    }
  </style>
</head>

<body>

  <div class="navbar">
    <div class="logo">Desde<br>Aquí</div>

    <button class="map-btn" onclick="window.location.href='/'">Mapa</button>
    <button class="explo-btn" onclick="window.location.href='/explorar'">Explorar</button>
    <button class="guar-btn" onclick="window.location.href='/guardados'">Guardados</button>
    <button class="perfil-btn" onclick="window.location.href='/perfil'">Perfil</button>

    <div class="usuario-navbar" th:if="${usuario != null}">

  <div class="usuario-info">

    <div class="foto-navbar">
      <img th:if="${usuario.fotoPerfil != null and !usuario.fotoPerfil.isEmpty()}"
           th:src="@{${usuario.fotoPerfil}}"
           alt="Foto de perfil">

      <span th:unless="${usuario.fotoPerfil != null and !usuario.fotoPerfil.isEmpty()}">👤</span>
    </div>

    <span class="usuario-nombre" th:text="${usuario.nombre}">Usuario</span>

  </div>

  <a class="btn-salir" href="/logout">
    Salir
  </a>

</div>
  </div>

  <div class="contenedor">

    <div class="panel-guardados">

      <div class="titulo-guardados">Mis destinos guardados</div>

      <div class="subtitulo">
        Lugares que marcaste para visitar después.
      </div>

      <div th:if="${#lists.isEmpty(guardados)}" class="vacio">
        Aún no tienes destinos guardados.
      </div>

      <div class="lista-guardados">

        <div th:each="g : ${guardados}" class="destino">

          <div class="destino-img">
            <img th:if="${g.destino.imagen != null and !g.destino.imagen.isEmpty()}"
              th:src="@{/img/{imagen}(imagen=${g.destino.imagen})}" th:alt="${g.destino.nombre}">

            <img th:unless="${g.destino.imagen != null and !g.destino.imagen.isEmpty()}" src="/img/fondo5.jpeg"
              alt="Imagen predeterminada">
          </div>

          <div class="info">
            <h2 th:text="${g.destino.nombre}">Destino</h2>
            <p th:text="${g.destino.descripcion}">Descripción</p>
          </div>

          <div class="acciones">
            <button class="btn-img-guardado ver" type="button" onclick="window.location.href='/'">
              Ver en mapa
            </button>

            <form method="post" th:action="@{/guardados/eliminar/{id}(id=${g.id})}">
              <button class="btn-img-guardado eliminar" type="submit">
                Eliminar
              </button>
            </form>
          </div>

        </div>

      </div>

    </div>

  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const rutaActual = window.location.pathname;

      if (rutaActual === "/") {
        document.querySelector(".map-btn")?.classList.add("activo");
      }

      if (rutaActual.startsWith("/explorar")) {
        document.querySelector(".explo-btn")?.classList.add("activo");
      }

      if (rutaActual.startsWith("/guardados")) {
        document.querySelector(".guar-btn")?.classList.add("activo");
      }

      if (rutaActual.startsWith("/perfil")) {
        document.querySelector(".perfil-btn")?.classList.add("activo");
      }
    });
  </script>

</body>

</html>
